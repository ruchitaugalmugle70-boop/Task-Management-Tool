spring.application.name=TaskManagementTool_b7.2

# Dynamic Port Selection (Render / Cloud environment)
server.port=${PORT:7878}

# Dynamic Datasource Configuration (Defaults to embedded H2 if no external MySQL URL provided)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:taskmanagementdb;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 Web Console (For debugging cloud DB)
spring.h2.console.enabled=true

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true